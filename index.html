<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For karuna ❤️</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: black;
  overflow: hidden;
  color: white;
}

/* 🌌 PARALLAX STARS */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

/* CENTER */
.center {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
}

.hidden { display: none; }

button {
  padding: 12px 25px;
  font-size: 18px;
  border-radius: 30px;
  border: none;
  cursor: pointer;
  background: linear-gradient(45deg, #ff4b5c, #ff6a88);
  color: white;
}

/* ❤️ HEARTBEAT */
.heartbeat {
  font-size: 50px;
  animation: beat 1s infinite;
}
@keyframes beat {
  0%,100%{transform:scale(1);}
  50%{transform:scale(1.2);}
}

/* 💬 CHAT */
.chat {
  width: 80%;
  max-width: 400px;
}
.msg {
  padding: 10px;
  margin: 10px;
  border-radius: 10px;
  background: #ff4b5c;
  text-align: left;
  animation: fade 0.5s;
}
@keyframes fade {
  from{opacity:0;transform:translateY(10px);}
  to{opacity:1;}
}

/* 🎮 GAME */
.heart {
  position: fixed;
  font-size: 25px;
  cursor: pointer;
}

/* 📸 MEMORY */
.memory {
  filter: blur(10px);
  transition: 2s;
}
.memory.show {
  filter: blur(0);
}

/* 💍 PROPOSAL */
#proposal {
  font-size: 35px;
  text-align: center;
  animation: glow 2s infinite alternate;
}
@keyframes glow {
  from { text-shadow: 0 0 10px pink; }
  to { text-shadow: 0 0 40px red; }
}

/* 🎇 PARTICLES */
.particle {
  position: fixed;
  font-size: 20px;
  animation: explode 1s forwards;
}
@keyframes explode {
  to { transform: scale(3) translateY(-200px); opacity: 0; }
}
</style>
</head>

<body>

<canvas id="stars"></canvas>

<audio id="music" loop>
<source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3">
</audio>

<!-- ❤️ INTRO -->
<div id="intro" class="center">
  <div class="heartbeat">❤️</div>
  <h2>Hey karuna...</h2>
  <button onclick="start()">Tap ❤️</button>
</div>

<!-- 💬 CHAT -->
<div id="chatBox" class="center hidden">
  <div id="chat" class="chat"></div>
</div>

<!-- 🎮 GAME -->
<div id="game" class="hidden center">
  <h2>Catch my love ❤️ (10 sec)</h2>
  <p>Score: <span id="score">0</span></p>
</div>

<!-- 📸 MEMORY -->
<div id="memory" class="center hidden">
  <img id="memImg" class="memory" width="300">
</div>

<!-- 💍 PROPOSAL -->
<div id="proposalBox" class="center hidden">
  <div id="proposal">Will You Be Mine Forever? 💍❤️</div>
  <button onclick="yes()">YES 😍</button>
  <button id="no" onmouseover="moveNo()">NO 😢</button>
</div>

<script>
/* 🌌 PARALLAX STARS */
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");
canvas.width = innerWidth;
canvas.height = innerHeight;

let stars=[];
for(let i=0;i<200;i++){
 stars.push({x:Math.random()*innerWidth,y:Math.random()*innerHeight});
}

let mouseX=0,mouseY=0;
document.onmousemove=e=>{
 mouseX=e.clientX;
 mouseY=e.clientY;
};

function animate(){
 ctx.clearRect(0,0,canvas.width,canvas.height);
 stars.forEach(s=>{
   let dx=(mouseX-innerWidth/2)/50;
   let dy=(mouseY-innerHeight/2)/50;
   ctx.fillRect(s.x+dx,s.y+dy,2,2);
 });
 requestAnimationFrame(animate);
}
animate();

/* START */
function start(){
 intro.classList.add("hidden");
 chatBox.classList.remove("hidden");
 music.volume=0;
 music.play();
 fadeMusic();
 showChat();
}

/* MUSIC FADE */
function fadeMusic(){
 let v=0;
 let i=setInterval(()=>{
  v+=0.05;
  music.volume=v;
  if(v>=1) clearInterval(i);
 },200);
}

/* 💬 CHAT STORY */
let msgs=[
 "Hey karuna 💖",
 "Mujhe tumse kuch kehna hai...",
 "Jab tum hasti ho na...",
 "Lagta hai duniya perfect hai ❤️",
 "Aur aaj... ek game kheloge mere saath?"
];

let c=0;
function showChat(){
 if(c<msgs.length){
  let m=document.createElement("div");
  m.className="msg";
  m.innerText=msgs[c++];
  document.getElementById("chat").appendChild(m);
  setTimeout(showChat,1500);
 } else {
  setTimeout(startGame,2000);
 }
}

/* 🎮 GAME */
let score=0,time=10;

function startGame(){
 chatBox.classList.add("hidden");
 game.classList.remove("hidden");
 spawnHeart();

 let timer=setInterval(()=>{
  time--;
  if(time<=0){
   clearInterval(timer);
   showMemory();
  }
 },1000);
}

function spawnHeart(){
 let h=document.createElement("div");
 h.innerHTML="❤️";
 h.className="heart";
 h.style.left=Math.random()*90+"vw";
 h.style.top="-50px";

 let fall=setInterval(()=>{
  h.style.top=(h.offsetTop+5)+"px";
  if(h.offsetTop>innerHeight){
   h.remove();
   clearInterval(fall);
   spawnHeart();
  }
 },20);

 h.onclick=()=>{
  score++;
  document.getElementById("score").innerText=score;
  h.remove();
  clearInterval(fall);
  spawnHeart();
 };

 document.body.appendChild(h);
}

/* 📸 MEMORY */
function showMemory(){
 game.classList.add("hidden");
 memory.classList.remove("hidden");

 let img=document.getElementById("memImg");
 img.src="https://via.placeholder.com/300?text=Our+Memory";

 setTimeout(()=>img.classList.add("show"),500);
 setTimeout(showProposal,3000);
}

/* 💍 PROPOSAL */
function showProposal(){
 memory.classList.add("hidden");
 proposalBox.classList.remove("hidden");
}

/* YES */
function yes(){
 for(let i=0;i<40;i++){
  let p=document.createElement("div");
  p.innerHTML="✨";
  p.className="particle";
  p.style.left=Math.random()*100+"vw";
  p.style.top=Math.random()*100+"vh";
  document.body.appendChild(p);
  setTimeout(()=>p.remove(),1000);
 }
 alert("I Love You Forever ❤️");
}

/* NO ESCAPE 😈 */
function moveNo(){
 no.style.position="absolute";
 no.style.left=Math.random()*innerWidth+"px";
 no.style.top=Math.random()*innerHeight+"px";
}
</script>

</body>
</html>

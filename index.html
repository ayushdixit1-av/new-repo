<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Ukaizu ❤️</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: black;
  color: white;
  overflow: hidden;
  text-align: center;
}

/* 🌌 Canvas */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

/* Center */
.center {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}

.hidden { display: none; }

button {
  padding: 12px 25px;
  font-size: 18px;
  border-radius: 25px;
  border: none;
  margin: 10px;
  cursor: pointer;
  background: linear-gradient(45deg, #ff4b5c, #ff6a88);
  color: white;
}

/* Shayari */
#shayari {
  font-size: 24px;
  min-height: 60px;
  width: 80%;
}

/* Hearts */
.heart {
  position: fixed;
  font-size: 25px;
  cursor: pointer;
}

/* Floating love */
@keyframes floatUp {
  to {
    transform: translateY(-120vh);
    opacity: 0;
  }
}

/* Fireworks */
.firework {
  position: fixed;
  font-size: 20px;
  animation: explode 1s linear forwards;
}
@keyframes explode {
  to { transform: translateY(-300px) scale(2); opacity: 0; }
}

/* Glow proposal */
#proposal h1 {
  animation: glow 2s infinite alternate;
}
@keyframes glow {
  from { text-shadow: 0 0 10px #ff4b5c; }
  to { text-shadow: 0 0 30px #ff6a88; }
}

/* Memory images */
.memory-img {
  width: 250px;
  border-radius: 20px;
  margin-top: 20px;
}
</style>

</head>
<body>

<canvas id="stars"></canvas>

<audio id="music" loop>
  <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3">
</audio>

<!-- Intro -->
<div id="intro" class="center">
  <h1>Hey Ukaizu 💖</h1>
  <p>This is something from my heart...</p>
  <button onclick="start()">Start 💫</button>
  <br>
  <button onclick="toggleMusic()">🎵 Music</button>
</div>

<!-- Shayari -->
<div id="letter" class="hidden center">
  <div id="shayari"></div>
</div>

<!-- Mini Game -->
<div id="miniGame" class="hidden center">
  <h2>Ukaizu ❤️ Tap 5 Hearts Quickly</h2>
  <p>Score: <span id="score">0</span></p>
</div>

<!-- Proposal -->
<div id="proposal" class="hidden center">
  <h1>Ukaizu, Will You Marry Me? 💍❤️</h1>
  <button onclick="yes()">YES 😍</button>
  <button id="no" onmouseover="moveNo()">NO 😢</button>
</div>

<script>
/* 🌌 Galaxy Background */
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];
for(let i=0;i<200;i++){
  stars.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    size: Math.random()*2,
    speed: Math.random()*0.5
  });
}

function animateStars(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  stars.forEach(s=>{
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.size,0,Math.PI*2);
    ctx.fillStyle="white";
    ctx.fill();

    s.y += s.speed;
    if(s.y > canvas.height) s.y = 0;
  });

  requestAnimationFrame(animateStars);
}
animateStars();

/* 💖 Floating Love */
setInterval(()=>{
  let h = document.createElement("div");
  h.innerHTML = "💖";
  h.style.position = "fixed";
  h.style.left = Math.random()*100+"vw";
  h.style.top = "100vh";
  h.style.opacity = 0.7;
  h.style.animation = "floatUp 4s linear forwards";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),4000);
},400);

/* Start */
function start(){
  intro.classList.add("hidden");
  letter.classList.remove("hidden");
  music.play();
  showShayari();
}

/* 💬 Typing Effect */
function typeWriter(text, callback){
  let index = 0;
  const el = document.getElementById("shayari");
  el.innerHTML = "";

  function type(){
    if(index < text.length){
      el.innerHTML += text.charAt(index);
      index++;
      setTimeout(type, 40);
    } else {
      setTimeout(callback, 1200);
    }
  }
  type();
}

/* Shayari */
let shayariList = [
 "Ukaizu... tum meri zindagi ki sabse khoobsurat kahani ho 💖",
 "Tumhari muskaan meri duniya hai 🌸",
 "Har pal bas tumhara saath chahiye 🫶",
 "Tum ho toh sab kuch hai... tum nahi toh kuch bhi nahi ❤️",
 "Aur aaj... main tumse ek baat kehna chahta hoon 💫"
];

let i=0;
function showShayari(){
  if(i < shayariList.length){
    typeWriter(shayariList[i++], showShayari);
  } else {
    startMiniGame();
  }
}

/* 🎮 Game */
let score = 0;

function startMiniGame(){
  letter.classList.add("hidden");
  miniGame.classList.remove("hidden");
  spawnHeart();
}

function spawnHeart(){
  let h = document.createElement("div");
  h.innerHTML = "❤️";
  h.className = "heart";
  h.style.left = Math.random()*90 + "vw";
  h.style.top = "-50px";

  let fall = setInterval(()=>{
    h.style.top = (h.offsetTop + 3) + "px";
    if(h.offsetTop > window.innerHeight){
      h.remove();
      clearInterval(fall);
      spawnHeart();
    }
  },20);

  h.onclick = () => {
    score++;
    document.getElementById("score").innerText = score;
    h.remove();
    clearInterval(fall);

    if(score >= 5){
      showMemories();
    } else {
      spawnHeart();
    }
  };

  document.body.appendChild(h);
}

/* 📸 Memories */
function showMemories(){
  miniGame.classList.add("hidden");

  let images = [
    "https://via.placeholder.com/250?text=Memory+1",
    "https://via.placeholder.com/250?text=Memory+2",
    "https://via.placeholder.com/250?text=Memory+3"
  ];

  let img = document.createElement("img");
  img.className = "memory-img";
  document.body.appendChild(img);

  let idx = 0;
  function next(){
    if(idx < images.length){
      img.src = images[idx++];
      setTimeout(next, 2000);
    } else {
      img.remove();
      showProposal();
    }
  }
  next();
}

/* 💍 Proposal */
function showProposal(){
  proposal.classList.remove("hidden");
}

function yes(){
  alert("Ukaizu ❤️ I Love You Forever 💍💖");
  fireworks();
}

/* 🎇 Fireworks */
function fireworks(){
  for(let i=0;i<30;i++){
    let f=document.createElement("div");
    f.innerHTML="✨";
    f.className="firework";
    f.style.left=Math.random()*100+"vw";
    f.style.top=Math.random()*100+"vh";
    document.body.appendChild(f);
    setTimeout(()=>f.remove(),1000);
  }
}

/* 😈 NO Button */
function moveNo(){
  const messages = [
    "Soch lo 😢",
    "Pakka? 🥺",
    "Ek aur chance 😭",
    "Mat bolo na 😭❤️"
  ];
  alert(messages[Math.floor(Math.random()*messages.length)]);

  no.style.position="absolute";
  no.style.left=Math.random()*window.innerWidth+"px";
  no.style.top=Math.random()*window.innerHeight+"px";
}

/* 🎵 Music */
function toggleMusic(){
  if(music.paused) music.play();
  else music.pause();
}
</script>

</body>
</html>
